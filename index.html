<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gaming-Fam Community Hub</title>
  <style>
    body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #050807;
  color: #e5e5e5;
}

/* HEADER + NAVIGATION */
header {
  padding: 20px 0;
  background: linear-gradient(90deg, #00ff7f, #00c46b);
  text-align: center;
  color: #000;
  font-weight: bold;
  font-size: 28px;
  letter-spacing: 1px;
}

nav {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 12px;
}

nav a {
  color: #000;
  font-weight: bold;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.25);
  transition: 0.2s;
  font-size: 14px;
}

nav a:hover {
  background: #00ff7f;
  color: #000;
}

/* INHALT */
main {
  padding: 40px;
  max-width: 900px;
  margin: 0 auto;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
  color: #00ff7f;
}

.tagline {
  color: #7affb3;
  margin-bottom: 30px;
  font-size: 18px;
}

.card {
  background: rgba(10, 20, 15, 0.9);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(0, 255, 127, 0.3);
}

.card h2 {
  margin-top: 0;
  margin-bottom: 8px;
  font-size: 24px;
  color: #00ff7f;
}

.pill {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(0, 255, 127, 0.15);
  color: #00ff7f;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
